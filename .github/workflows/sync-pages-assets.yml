name: Sync Pages Assets

on:
  push:
    branches: ['main']
    paths-ignore:
      - 'assets/app.js'
      - 'assets/app.css'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Sync app bundle for branch-based Pages
        run: |
          set -euo pipefail
          mkdir -p assets
          js_file="$(ls dist/assets/index-*.js | head -n 1)"
          css_file="$(ls dist/assets/index-*.css | head -n 1)"
          cp "$js_file" assets/app.js
          cp "$css_file" assets/app.css

      - name: Commit and push generated assets
        run: |
          set -euo pipefail
          git add assets/app.js assets/app.css
          if git diff --cached --quiet; then
            echo "No asset changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync Pages assets [skip ci]"
          git push
